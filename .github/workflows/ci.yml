name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore .\NexaDesk.sln -p:Platform=x64

      - name: Build native application
        run: >
          msbuild .\NexaDesk.sln
          /m
          /p:Configuration=Release
          /p:Platform=x64
          /p:AppxPackageSigningEnabled=false
          /bl:artifacts\ci.binlog

      - name: Publish framework-dependent portable build
        shell: pwsh
        run: |
          dotnet publish .\src\NexaDesk\NexaDesk.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -p:Platform=x64 `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=false `
            -p:WindowsAppSdkBootstrapInitialize=true `
            -p:WindowsAppSdkUndockedRegFreeWinRTInitialize=false `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -o .\artifacts\portable-framework

      - name: Publish self-contained portable build
        shell: pwsh
        run: |
          dotnet publish .\src\NexaDesk\NexaDesk.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Platform=x64 `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:WindowsAppSdkBootstrapInitialize=false `
            -p:WindowsAppSdkUndockedRegFreeWinRTInitialize=true `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -o .\artifacts\portable-selfcontained

      - name: Verify portable output composition
        shell: pwsh
        run: |
          $selfContained = Resolve-Path .\artifacts\portable-selfcontained
          $required = @(
            "NexaDesk.exe",
            "NexaDesk.dll",
            "NexaDesk.pri",
            "Microsoft.WinUI.dll",
            "WinRT.Runtime.dll"
          )
          foreach ($name in $required) {
            $path = Join-Path $selfContained $name
            if (-not (Test-Path $path)) {
              throw "Self-contained output is missing $name"
            }
          }

          $runtimeDlls = Get-ChildItem $selfContained -Filter "Microsoft.WindowsAppRuntime*.dll" -File
          if (-not $runtimeDlls) {
            throw "Self-contained output is missing Windows App SDK runtime DLLs."
          }

      - name: Collect hosted-runner startup diagnostics
        continue-on-error: true
        shell: pwsh
        run: |
          # GitHub-hosted runners do not provide a normal interactive desktop.
          # This step detects immediate crashes and collects stage logs. Real
          # visibility is verified by the app's own watchdog on desktop Windows.
          $root = Join-Path $env:LOCALAPPDATA "NexaDesk"
          $probe = Join-Path $root "startup-probe.txt"
          $log = Join-Path $root "logs\nexadesk.log"
          $bootstrapLog = Join-Path $root "logs\bootstrap.log"
          $diagnostics = Join-Path (Resolve-Path .\artifacts) "diagnostics"

          Remove-Item $root -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $diagnostics -Force | Out-Null

          $exe = (Resolve-Path .\artifacts\portable-selfcontained\NexaDesk.exe).Path
          $process = Start-Process -FilePath $exe -PassThru

          try {
            Start-Sleep -Seconds 8
            $process.Refresh()

            if ($process.HasExited) {
              throw "NexaDesk exited during startup. Exit code: $($process.ExitCode)"
            }

            if (Test-Path $probe) {
              Copy-Item $probe (Join-Path $diagnostics "startup-probe.txt") -Force
              Get-Content $probe
            }
          }
          finally {
            foreach ($source in @($bootstrapLog, $log)) {
              if (Test-Path $source) {
                Copy-Item $source $diagnostics -Force
                Write-Host "---- $source ----"
                Get-Content $source
              }
            }

            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: NexaDesk-ci-x64
          path: |
            artifacts/portable-framework/**
            artifacts/portable-selfcontained/**
            artifacts/ci.binlog
            artifacts/diagnostics/**
          if-no-files-found: warn
          retention-days: 7
