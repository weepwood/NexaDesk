name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore .\NexaDesk.sln -p:Platform=x64

      - name: Build native application
        run: >
          msbuild .\NexaDesk.sln
          /m
          /p:Configuration=Release
          /p:Platform=x64
          /p:WindowsPackageType=None
          /p:AppxPackageSigningEnabled=false
          /bl:artifacts\ci.binlog

      - name: Publish framework-dependent portable build
        shell: pwsh
        run: |
          dotnet publish .\src\NexaDesk\NexaDesk.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -p:Platform=x64 `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=false `
            -p:PublishReadyToRun=true `
            -o .\artifacts\portable-framework

      - name: Publish self-contained startup smoke build
        shell: pwsh
        run: |
          dotnet publish .\src\NexaDesk\NexaDesk.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Platform=x64 `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:PublishReadyToRun=true `
            -o .\artifacts\portable-selfcontained

      - name: Verify application reports a visible native window
        shell: pwsh
        run: |
          $root = Join-Path $env:LOCALAPPDATA "NexaDesk"
          $probe = Join-Path $root "startup-probe.txt"
          $log = Join-Path $root "logs\nexadesk.log"
          $diagnostics = Join-Path (Resolve-Path .\artifacts) "diagnostics"

          Remove-Item $root -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $diagnostics -Force | Out-Null

          $exe = (Resolve-Path .\artifacts\portable-selfcontained\NexaDesk.exe).Path
          $process = Start-Process -FilePath $exe -PassThru
          $deadline = (Get-Date).AddSeconds(30)

          try {
            while ((Get-Date) -lt $deadline) {
              Start-Sleep -Milliseconds 500
              $process.Refresh()

              if ($process.HasExited) {
                if (Test-Path $log) {
                  Write-Host "---- NexaDesk startup log ----"
                  Get-Content $log
                  Copy-Item $log (Join-Path $diagnostics "nexadesk.log") -Force
                }
                throw "NexaDesk exited before reporting window visibility. Exit code: $($process.ExitCode)"
              }

              if (Test-Path $probe) {
                $probeLines = Get-Content $probe
                Write-Host "---- NexaDesk startup probe ----"
                $probeLines | ForEach-Object { Write-Host $_ }
                Copy-Item $probe (Join-Path $diagnostics "startup-probe.txt") -Force

                if ($probeLines -contains "visible=true") {
                  Write-Host "NexaDesk reported a visible native top-level window."
                  exit 0
                }
              }
            }

            if (Test-Path $log) {
              Write-Host "---- NexaDesk startup log ----"
              Get-Content $log
              Copy-Item $log (Join-Path $diagnostics "nexadesk.log") -Force
            }
            throw "NexaDesk did not report a visible native window within 30 seconds."
          }
          finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: NexaDesk-ci-x64
          path: |
            artifacts/portable-framework/**
            artifacts/ci.binlog
            artifacts/diagnostics/**
          if-no-files-found: warn
          retention-days: 7
