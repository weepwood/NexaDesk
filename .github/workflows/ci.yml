name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Verify WinUI XAML startup contract
        shell: pwsh
        run: |
          $sourceFiles = Get-ChildItem .\src\NexaDesk -Recurse -File |
            Where-Object Extension -In '.xaml', '.cs'
          $forbidden = @(
            '<NavigationView',
            '<TabView',
            'ms-appx:///Microsoft.UI.Xaml/Themes/'
          )
          foreach ($pattern in $forbidden) {
            $matches = $sourceFiles | Select-String -SimpleMatch $pattern
            if ($matches) {
              $matches | ForEach-Object { Write-Error "$($_.Path):$($_.LineNumber): $($_.Line)" }
              throw "Portable UI contains a forbidden WinUI dependency: $pattern"
            }
          }

          $appXaml = Get-Content .\src\NexaDesk\App.xaml -Raw
          if ($appXaml -notmatch '<muxc:XamlControlsResources\s*/>') {
            throw "App.xaml must load XamlControlsResources for WinUI control templates."
          }

          $program = Get-Content .\src\NexaDesk\Program.cs -Raw
          if ($program -notmatch 'XamlCheckProcessRequirements\(\);') {
            throw "Custom Program.Main must call XamlCheckProcessRequirements before Application.Start."
          }
          if ($program.IndexOf('XamlCheckProcessRequirements();') -gt $program.IndexOf('Application.Start(')) {
            throw "XamlCheckProcessRequirements must execute before Application.Start."
          }

      - name: Restore
        run: dotnet restore .\NexaDesk.sln -p:Platform=x64

      - name: Build native application
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\artifacts -Force | Out-Null
          & msbuild .\NexaDesk.sln `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AppxPackageSigningEnabled=false `
            /v:minimal `
            /bl:artifacts\ci.binlog 2>&1 |
            Tee-Object -FilePath .\artifacts\build.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            throw "Native build failed with exit code $exitCode."
          }

      - name: Publish framework-dependent portable build
        shell: pwsh
        run: |
          dotnet publish .\src\NexaDesk\NexaDesk.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -p:Platform=x64 `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=false `
            -p:WindowsAppSdkBootstrapInitialize=true `
            -p:WindowsAppSdkUndockedRegFreeWinRTInitialize=false `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -o .\artifacts\portable-framework

      - name: Publish self-contained portable build
        shell: pwsh
        run: |
          dotnet publish .\src\NexaDesk\NexaDesk.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Platform=x64 `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:WindowsAppSdkBootstrapInitialize=false `
            -p:WindowsAppSdkUndockedRegFreeWinRTInitialize=true `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -o .\artifacts\portable-selfcontained

      - name: Verify portable output composition
        shell: pwsh
        run: |
          $selfContained = Resolve-Path .\artifacts\portable-selfcontained
          $required = @(
            "NexaDesk.exe",
            "NexaDesk.dll",
            "NexaDesk.pri",
            "Microsoft.WinUI.dll",
            "Microsoft.UI.pri",
            "Microsoft.UI.Xaml.Controls.pri",
            "Microsoft.ui.xaml.dll",
            "Microsoft.ui.xaml.resources.common.dll",
            "Microsoft.ui.xaml.resources.19h1.dll",
            "WinRT.Runtime.dll"
          )
          foreach ($name in $required) {
            $path = Join-Path $selfContained $name
            if (-not (Test-Path $path)) {
              throw "Self-contained output is missing $name"
            }
          }

          $runtimeDlls = Get-ChildItem $selfContained -Filter "Microsoft.WindowsAppRuntime*.dll" -File
          if (-not $runtimeDlls) {
            throw "Self-contained output is missing Windows App SDK runtime DLLs."
          }

      - name: Verify self-contained startup
        shell: pwsh
        run: |
          $root = Join-Path $env:LOCALAPPDATA "NexaDesk"
          $probe = Join-Path $root "startup-probe.txt"
          $log = Join-Path $root "logs\nexadesk.log"
          $bootstrapLog = Join-Path $root "logs\bootstrap.log"
          $diagnostics = Join-Path (Resolve-Path .\artifacts) "diagnostics"

          Remove-Item $root -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $diagnostics -Force | Out-Null

          $exe = (Resolve-Path .\artifacts\portable-selfcontained\NexaDesk.exe).Path
          $process = Start-Process -FilePath $exe -PassThru

          try {
            Start-Sleep -Seconds 8
            $process.Refresh()

            if ($process.HasExited) {
              throw "NexaDesk exited during startup. Exit code: $($process.ExitCode)"
            }

            if (-not (Test-Path $probe)) {
              throw "NexaDesk did not produce a startup visibility probe."
            }

            $probeText = Get-Content $probe -Raw
            Write-Host $probeText
            if ($probeText -notmatch 'visible=true') {
              throw "NexaDesk did not report a visible native window."
            }

            foreach ($source in @($bootstrapLog, $log)) {
              if (Test-Path $source) {
                $text = Get-Content $source -Raw
                Write-Host "---- $source ----"
                Write-Host $text
                if ($text -match 'XamlParseException|Cannot locate resource|Cannot find a Resource') {
                  throw "NexaDesk startup log contains a XAML resource failure."
                }
              }
            }
          }
          finally {
            foreach ($source in @($probe, $bootstrapLog, $log)) {
              if (Test-Path $source) {
                Copy-Item $source $diagnostics -Force
              }
            }

            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: NexaDesk-ci-x64
          path: |
            artifacts/portable-framework/**
            artifacts/portable-selfcontained/**
            artifacts/ci.binlog
            artifacts/build.log
            artifacts/diagnostics/**
          if-no-files-found: warn
          retention-days: 7