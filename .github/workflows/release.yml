name: Release

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - "release/v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Version without v prefix, for example 0.1.2
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_PUBLISHER: ${{ secrets.WINDOWS_CERTIFICATE_PUBLISHER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $inputVersion = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($inputVersion)) {
            $refName = "${{ github.ref_name }}"
            if ($refName.StartsWith("release/v")) {
              $inputVersion = $refName.Substring("release/v".Length)
            } else {
              $inputVersion = $refName.TrimStart("v")
            }
          }
          if ($inputVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must use major.minor.patch format."
          }
          "semver=$inputVersion" >> $env:GITHUB_OUTPUT
          "package=$inputVersion.0" >> $env:GITHUB_OUTPUT
          "tag=v$inputVersion" >> $env:GITHUB_OUTPUT

      - name: Detect signing configuration
        id: signing
        shell: pwsh
        run: |
          $available = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -and
                       -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD) -and
                       -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PUBLISHER)
          "available=$($available.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore .\NexaDesk.sln -p:Platform=x64

      - name: Prepare certificate and identity
        if: steps.signing.outputs.available == 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\.local\certificates -Force | Out-Null
          $pfxPath = Join-Path (Resolve-Path .\.local\certificates) "release.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          .\scripts\Set-PackageIdentity.ps1 `
            -Version "${{ steps.version.outputs.package }}" `
            -Publisher $env:WINDOWS_CERTIFICATE_PUBLISHER

      - name: Build framework-dependent portable package
        shell: pwsh
        run: |
          dotnet publish .\src\NexaDesk\NexaDesk.csproj `
            -c Release -r win-x64 --self-contained false `
            -p:Platform=x64 `
            -p:Version="${{ steps.version.outputs.semver }}" `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=false `
            -p:WindowsAppSdkBootstrapInitialize=true `
            -p:WindowsAppSdkUndockedRegFreeWinRTInitialize=false `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -o .\artifacts\portable-framework
          Compress-Archive -Path .\artifacts\portable-framework\* `
            -DestinationPath .\artifacts\NexaDesk-portable-x64-framework.zip -Force

      - name: Build self-contained portable package
        shell: pwsh
        run: |
          dotnet publish .\src\NexaDesk\NexaDesk.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:Platform=x64 `
            -p:Version="${{ steps.version.outputs.semver }}" `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:WindowsAppSdkBootstrapInitialize=false `
            -p:WindowsAppSdkUndockedRegFreeWinRTInitialize=true `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -o .\artifacts\portable-selfcontained
          Compress-Archive -Path .\artifacts\portable-selfcontained\* `
            -DestinationPath .\artifacts\NexaDesk-windows-x64.zip -Force
          Copy-Item .\artifacts\NexaDesk-windows-x64.zip `
            .\artifacts\NexaDesk-portable-x64-selfcontained.zip -Force

      - name: Verify self-contained package
        shell: pwsh
        run: |
          $dir = Resolve-Path .\artifacts\portable-selfcontained
          foreach ($name in @("NexaDesk.exe", "NexaDesk.dll", "NexaDesk.pri", "Microsoft.WinUI.dll", "WinRT.Runtime.dll")) {
            if (-not (Test-Path (Join-Path $dir $name))) {
              throw "Self-contained package is missing $name"
            }
          }
          if (-not (Get-ChildItem $dir -Filter "Microsoft.WindowsAppRuntime*.dll" -File)) {
            throw "Self-contained package is missing Windows App SDK runtime DLLs."
          }

      - name: Build signed self-contained MSIX
        if: steps.signing.outputs.available == 'true'
        shell: pwsh
        run: |
          $pfx = (Resolve-Path .\.local\certificates\release.pfx).Path
          $packageDir = (New-Item -ItemType Directory -Path .\artifacts\msix-output -Force).FullName + "\"
          msbuild .\src\NexaDesk\NexaDesk.csproj `
            /restore /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifier=win-x64 `
            /p:Version="${{ steps.version.outputs.semver }}" `
            /p:AppxPackage=true `
            /p:WindowsPackageType=MSIX `
            /p:WindowsAppSDKSelfContained=true `
            /p:WindowsAppSdkBootstrapInitialize=false `
            /p:WindowsAppSdkUndockedRegFreeWinRTInitialize=false `
            /p:GenerateAppxPackageOnBuild=true `
            /p:AppxBundle=Never `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateKeyFile="$pfx" `
            /p:PackageCertificatePassword="$env:WINDOWS_CERTIFICATE_PASSWORD" `
            /p:AppxPackageDir="$packageDir"
          if ($LASTEXITCODE -ne 0) { throw "MSIX build failed." }
          $msix = Get-ChildItem .\artifacts\msix-output -Recurse -File |
            Where-Object Extension -eq ".msix" |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if (-not $msix) { throw "No MSIX package was produced." }
          Copy-Item $msix.FullName .\artifacts\NexaDesk-x64.msix -Force

      - name: Create App Installer manifest
        if: steps.signing.outputs.available == 'true'
        shell: pwsh
        run: |
          .\scripts\New-AppInstaller.ps1 `
            -Version "${{ steps.version.outputs.package }}" `
            -Publisher $env:WINDOWS_CERTIFICATE_PUBLISHER `
            -OutputPath .\artifacts\NexaDesk.appinstaller

      - name: Create checksums
        shell: pwsh
        run: |
          $releaseFiles = Get-ChildItem .\artifacts -File |
            Where-Object Name -Match '^NexaDesk.*\.(msix|appinstaller|zip)$'
          $lines = foreach ($file in $releaseFiles) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          [IO.File]::WriteAllLines(
            (Join-Path (Resolve-Path .\artifacts) "SHA256SUMS.txt"),
            $lines,
            (New-Object Text.UTF8Encoding($false)))

      - name: Create release notes
        shell: pwsh
        run: |
          $lines = @(
            "NexaDesk ${{ steps.version.outputs.semver }} fixes the portable WinUI startup pipeline.",
            "",
            "Recommended download:",
            "- NexaDesk-windows-x64.zip",
            "",
            "This build uses a unified unpackaged self-contained configuration, an explicit WinUI entry point, early bootstrap logging, and a startup watchdog."
          )
          [IO.File]::WriteAllLines(
            (Join-Path (Resolve-Path .\artifacts) "RELEASE_NOTES.md"),
            $lines,
            (New-Object Text.UTF8Encoding($false)))

      - name: Publish GitHub Release
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $assets = Get-ChildItem .\artifacts -File |
            Where-Object { $_.Name -match '^NexaDesk.*\.(msix|appinstaller|zip)$' -or $_.Name -eq 'SHA256SUMS.txt' } |
            ForEach-Object FullName
          if (-not $assets -or $assets.Count -eq 0) { throw "No release assets were produced." }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
            gh release edit $tag --notes-file .\artifacts\RELEASE_NOTES.md --title "NexaDesk ${{ steps.version.outputs.semver }}"
          } else {
            gh release create $tag @assets `
              --target "${{ github.sha }}" `
              --notes-file .\artifacts\RELEASE_NOTES.md `
              --title "NexaDesk ${{ steps.version.outputs.semver }}"
          }
          if ($LASTEXITCODE -ne 0) { throw "GitHub Release publishing failed." }
