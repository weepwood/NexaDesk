name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Version without v prefix, for example 0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_PUBLISHER: ${{ secrets.WINDOWS_CERTIFICATE_PUBLISHER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $inputVersion = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($inputVersion)) {
            $inputVersion = "${{ github.ref_name }}".TrimStart("v")
          }
          if ($inputVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must use major.minor.patch format."
          }
          "semver=$inputVersion" >> $env:GITHUB_OUTPUT
          "package=$inputVersion.0" >> $env:GITHUB_OUTPUT
          "tag=v$inputVersion" >> $env:GITHUB_OUTPUT

      - name: Validate signing secrets
        shell: pwsh
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) { $missing += "WINDOWS_CERTIFICATE" }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) { $missing += "WINDOWS_CERTIFICATE_PASSWORD" }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PUBLISHER)) { $missing += "WINDOWS_CERTIFICATE_PUBLISHER" }
          if ($missing.Count -gt 0) {
            throw "Missing repository secrets: $($missing -join ', ')"
          }

      - name: Restore
        run: dotnet restore .\NexaDesk.sln -p:Platform=x64

      - name: Prepare certificate and identity
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\.local\certificates -Force | Out-Null
          $pfxPath = Join-Path (Resolve-Path .\.local\certificates) "release.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          .\scripts\Set-PackageIdentity.ps1 `
            -Version "${{ steps.version.outputs.package }}" `
            -Publisher $env:WINDOWS_CERTIFICATE_PUBLISHER

      - name: Build framework-dependent portable package
        shell: pwsh
        run: |
          dotnet publish .\src\NexaDesk\NexaDesk.csproj `
            -c Release -r win-x64 --self-contained false `
            -p:Platform=x64 `
            -p:Version="${{ steps.version.outputs.semver }}" `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=false `
            -p:PublishReadyToRun=true `
            -o .\artifacts\portable-framework
          Compress-Archive -Path .\artifacts\portable-framework\* `
            -DestinationPath .\artifacts\NexaDesk-portable-x64-framework.zip -Force

      - name: Build self-contained portable package
        shell: pwsh
        run: |
          dotnet publish .\src\NexaDesk\NexaDesk.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:Platform=x64 `
            -p:Version="${{ steps.version.outputs.semver }}" `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:PublishReadyToRun=true `
            -o .\artifacts\portable-selfcontained
          Compress-Archive -Path .\artifacts\portable-selfcontained\* `
            -DestinationPath .\artifacts\NexaDesk-portable-x64-selfcontained.zip -Force

      - name: Build signed self-contained MSIX
        shell: pwsh
        run: |
          $pfx = (Resolve-Path .\.local\certificates\release.pfx).Path
          $packageDir = (New-Item -ItemType Directory -Path .\artifacts\msix-output -Force).FullName + "\"
          msbuild .\src\NexaDesk\NexaDesk.csproj `
            /restore /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifier=win-x64 `
            /p:Version="${{ steps.version.outputs.semver }}" `
            /p:AppxPackageVersion="${{ steps.version.outputs.package }}" `
            /p:WindowsAppSDKSelfContained=true `
            /p:GenerateAppxPackageOnBuild=true `
            /p:AppxBundle=Never `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateKeyFile="$pfx" `
            /p:PackageCertificatePassword="$env:WINDOWS_CERTIFICATE_PASSWORD" `
            /p:AppxPackageDir="$packageDir"
          if ($LASTEXITCODE -ne 0) { throw "MSIX build failed." }

          $msix = Get-ChildItem .\artifacts\msix-output -Recurse -File |
            Where-Object Extension -eq ".msix" |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if (-not $msix) { throw "No MSIX package was produced." }
          Copy-Item $msix.FullName .\artifacts\NexaDesk-x64.msix -Force

      - name: Create App Installer manifest
        shell: pwsh
        run: |
          .\scripts\New-AppInstaller.ps1 `
            -Version "${{ steps.version.outputs.package }}" `
            -Publisher $env:WINDOWS_CERTIFICATE_PUBLISHER `
            -OutputPath .\artifacts\NexaDesk.appinstaller

      - name: Create checksums
        shell: pwsh
        run: |
          $releaseFiles = Get-ChildItem .\artifacts -File |
            Where-Object Name -Match '^NexaDesk.*\.(msix|appinstaller|zip)$'
          $lines = foreach ($file in $releaseFiles) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          [IO.File]::WriteAllLines(
            (Join-Path (Resolve-Path .\artifacts) "SHA256SUMS.txt"),
            $lines,
            (New-Object Text.UTF8Encoding($false)))

      - name: Publish GitHub Release
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $assets = @(
            ".\artifacts\NexaDesk-x64.msix",
            ".\artifacts\NexaDesk.appinstaller",
            ".\artifacts\NexaDesk-portable-x64-framework.zip",
            ".\artifacts\NexaDesk-portable-x64-selfcontained.zip",
            ".\artifacts\SHA256SUMS.txt"
          )
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets --generate-notes `
              --title "NexaDesk ${{ steps.version.outputs.semver }}"
          }
          if ($LASTEXITCODE -ne 0) { throw "GitHub Release publishing failed." }
